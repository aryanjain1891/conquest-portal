upstream conquest_back_web {
	server conquest_back_web:9000;
}

server {
	listen 80;
    listen [::]:80;
    client_max_body_size 5m;
    
    location / {
        proxy_pass http://conquest_back_web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
    location /api/admin/ {
    	proxy_pass http://conquest_back_web;
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    	proxy_set_header Host $host;
    	proxy_redirect off;
    }

    location /static/ {
        alias /home/app/web/staticfiles/;
    }

    location /media/ {
        alias /home/app/web/mediafiles/;
    }
}
